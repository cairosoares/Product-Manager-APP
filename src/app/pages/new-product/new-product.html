<p-toast position="bottom-right" style="color: rgb(25, 87, 25); border-radius: 8px;"></p-toast>

<div class="w-full py-7 px-14 flex flex-col gap-6" [formGroup]="productForm">
  <!-- Container Header -->
  <div>
    <h2 class="font-bold">Novo produto</h2>
    <h4 class="font-light text-xs text-gray-600">Cadastre um produto para venda no marketplace</h4>
  </div>
  <!-- Container Conteúdo -->
  <div class="flex gap-4 items-start">
    <!-- Dados produto -->
    <div class="p-8 bg-white rounded-4xl flex-1 flex flex-col gap-7">
      <!-- Container Header -->
      <h3 class="text-gray-500 font-medium">Dados do produto</h3>
      
      <!-- Container Inputs -->
      <div class="flex flex-col gap-5">
        <!-- Container Inputs Título e Valor -->
        <div class="flex">
          <!-- Input Título -->
          <div class="flex flex-col gap-2 border-b border-gray-300 pb-2 w-4/5 mr-6">
            <span class="text-gray-600 text-xs">TÍTULO</span>
            <input 
              class="text-gray-400 text-sm focus:outline-none" 
              type="text" 
              placeholder="Nome do produto" 
              formControlName="title"
            />
          </div>

          <!-- Input Valor -->
          <div class="flex flex-col gap-2 border-b border-gray-300 pb-2 flex-1">
            <span class="text-gray-600 text-xs">VALOR</span>
            <div class="flex gap-2">
              <span>R$</span>
              <input 
                class="text-gray-400 text-sm focus:outline-none" 
                type="number" 
                placeholder="0,00" 
                formControlName="price"
              />
            </div>
          </div>
        </div>

        <div class="flex">
          <!-- Select Status -->
          <div class="flex flex-col gap-2 border-b border-gray-300 pb-2 flex-2 mr-6">
          <span class="text-gray-600 text-xs">CATEGORIA</span>
          <select 
            class="w-full bg-white text-gray-400 text-sm focus:outline-none" 
            formControlName="category"
          >
            <option value="" disabled selected hidden>Selecione</option>
            <option value="Eletrônicos">Eletrônicos</option>
            <option value="Roupas">Roupas</option>
            <option value="Alimentos">Alimentos</option>
            <option value="Livros">Livros</option>
            <option value="Brinquedos">Brinquedos</option>
          </select>
          </div>
          
          <!-- Input Quantidade -->
          <div class="flex flex-col gap-1 border-b border-gray-300 pb-2 flex-1 mr-6">
            <span class="text-gray-600 text-xs">Codigo do Produto</span>
            <div class="flex gap-2">
              <input 
                class="no-spinner text-gray-400 text-sm focus:outline-none" 
                type="number" 
                placeholder="0" 
                formControlName="productCode"
              />
            </div>
          </div>

          <!-- Input Quantidade -->
          <div class="flex flex-col gap-1 border-b border-gray-300 pb-2 flex-1">
            <span class="text-gray-600 text-xs">Quantidade</span>
            <div class="flex gap-2">
              <input 
                class="text-gray-400 text-sm focus:outline-none" 
                type="number" 
                placeholder="0" 
                formControlName="stock"
              />
            </div>
          </div>
        </div>

        <!-- Input Descrição -->
        <div class="flex flex-col gap-2 border-b border-gray-300 pb-2 flex-1">
          <span class="text-gray-600 text-xs">DESCRIÇÃO</span>
          <input 
            class="text-gray-400 text-sm focus:outline-none" 
            type="text" 
            placeholder="Escreva detalhes sobre o produto, tamanho, características" 
            formControlName="description"
          />
        </div>
      </div>

      <!-- Container Botões -->
       <div class="w-full flex gap-4">
        <!-- Botão Cancelar -->
          <div class="flex flex-1 justify-center p-3 rounded-lg border-[#363636] border-1 bg-white cursor-pointer active:translate-y-2 duration-200 
    ease-in-out transition">
            <span class="text-[#363636] text-sm">Cancelar</span>
          </div>
        <!-- Botão Salvar -->
          <div 
            [class]="`
              flex flex-1 justify-center p-3 rounded-lg
              ${ productForm.valid ? 'bg-[#363636] cursor-pointer active:translate-y-2 duration-200 ease-in-out transition' : 'bg-gray-500 cursor-default' }
            `"
            (click)="saveProduct()"
          >
            <span class="text-white text-sm">Salvar e publicar</span>
          </div>
       </div>

       @if(successMessage) {
          <p class="font-bold text-green-500">{{ successMessage }}</p>
       }
    </div>
  </div>
</div>
