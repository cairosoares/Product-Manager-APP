<div class="flex p-4 w-full justify-center" [formGroup]="userForm">
  <div class="p-6">
    <div class="flex items-center justify-center">
      <img class="w-24 h-24 mr-4" src="logo.png" />
      <div>
        <h2 class="font-bold">Marketplace</h2>
        <h4>Gestão de produtos</h4>
      </div>
    </div>

    <img style="width: 700px; height: auto;" src="fundo-home.png" />

    <!-- Botão de Acesso -->
    <div class="flex items-center justify-center">
      <div style="width: 300px;" [class]="`flex justify-between items-center mt-auto p-4 rounded-xl
       ${'cursor-pointer bg-[#363636] active:translate-y-2 duration-200 ease-in-out transition' }`"
       (click)="login()">
       <span class="text-white">Acessar</span>
       <img class="w-4 h-4" src="right-arrow.svg" />
      </div>
    </div>
  </div> 
</div>
